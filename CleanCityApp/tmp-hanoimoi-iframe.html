<body>
    <!-- Background element -->
    <div class="c-story-backgrounds">
        <figure class="c-story-backgrounds__clockwise">
            <img class="lazy" data-src="https://hnm.1cdn.vn/assets/hanoi-googlemap/trong-dong-c-2k-mirror.png"
                 src="https://hnm.1cdn.vn/assets/hanoi-googlemap/trong-dong-c-2k-mirror.png"

        </figure>
    </div>
    <div class="container">
        <!-- Mobile Toggle Button -->
        <button class="mobile-toggle" onclick="toggleSidebar()">

                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <!-- Mobile Overlay -->
        <div class="mobile-overlay" onclick="closeSidebar()"></div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <!-- Header với logo Hà Nội -->
            <div class="sidebar-header">
                <div class="logo" onclick="expandSidebar()">
                    <img src="/Assets/hanoi-googlemap/logo-thu-do-ha-noi.png" alt="Logo Hà Nội" />
                </div>
                <div class="header-content">
                    <h1>Thành Phố Hà Nội</h1>
                </div>
                <button class="close-btn" onclick="collapseSidebar()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.41 7.41L14 6L8 12L14 18L15.41 16.59L10.83 12Z" />
                    </svg>
                </button>
                <!-- Expand button (hiện khi collapsed) -->
                <button class="expand-btn" onclick="expandSidebar()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8.59 16.59L10 18L16 12L10 6L8.59 7.41L13.17 12Z" />
                    </svg>
                </button>
            </div>

            <!-- Thông tin cơ bản về Hà Nội -->
            <div class="city-info">
                <div class="city-info-item">
                    <span class="city-info-label">Diện tích:</span>
                    <span class="city-info-value">3.359,8 km²</span>
                </div>
                <div class="city-info-item">
                    <span class="city-info-label">Dân số:</span>
                    <span class="city-info-value">8.718.000</span>

                <div class="city-info-item">

            </div>

            <!-- Danh sách xã phường -->
            <div class="commune-list" id="communeList">
                <!-- Danh sách sẽ được tạo bởi JavaScript -->
            </div>
        </div>

        <!-- Map Container -->
        <div class="map-container">
            <div id="map"></div>

            <!-- Toggle Buttons -->
            <div class="toggle-buttons">
                <button class="toggle-btn active" onclick="toggleBoundary()" title="Làm nổi bật Hà Nội">

                    </svg>
                </button>

                    </svg>
                </button>
            </div>

            <!-- Detail Panel -->
            <div style="margin-top: 15px;" class="detail-panel" id="detailPanel">
                <div class="detail-panel-header">
                    <h2 class="detail-panel-title" id="detailTitle">Chọn một xã/phường</h2>
                    <button class="detail-panel-close" onclick="closeDetailPanel()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

                        </svg>
                    </button>
                </div>
                <div class="detail-panel-content" id="detailContent">
                    <!-- Nội dung sẽ được cập nhật bởi JavaScript -->
                </div>
            </div>
        </div>

    <script type="text/javascript">
    const CDN = 'https://hnm.1cdn.vn';
        const MaHoaXa = `${CDN}/assets/hanoi-googlemap/mahoa_xa.json`;
        const DiaPhan = `${CDN}/assets/hanoi-googlemap/DiaPhan_TinhHaNoi.json`;
        const IMGTrongDong = `${CDN}/hanoi-googlemap/maps/trong-dong.png`;
    </script>
    <script src="https://hnm.1cdn.vn/assets/hanoi-googlemap/loadmap-goongmap.min.js?t=202603302148"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let showLabels = true;
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.mobile-overlay');
            const expandBtn = document.querySelector('.expand-btn');

            // Sửa lại các function check màn hình
            function isMobile() {
                return window.innerWidth <= 674; // Đổi từ 768 thành 674 để khớp CSS
            }

            function isSmallMobile() {
                return window.innerWidth <= 425;
            }

            function isTablet() {
                return window.innerWidth >= 675 && window.innerWidth <= 871;
            }

            window.collapseSidebar = function () {
                //console.log('Collapse clicked at width:', window.innerWidth);

                if (isMobile()) {
                    // Mobile: đóng sidebar thay vì collapse
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                    console.log('Mobile: Closed sidebar');
                } else {
                    // Desktop/Tablet: collapse sidebar
                    sidebar.classList.add('collapsed');
                    if (expandBtn) expandBtn.style.display = 'flex';
                    console.log('Desktop/Tablet: Collapsed sidebar');
                }
            };

            window.expandSidebar = function () {
                if (isMobile()) {
                    // Mobile: mở sidebar
                    sidebar.classList.add('active');
                    overlay.classList.add('active');
                } else {
                    // Desktop/Tablet: expand sidebar
                    sidebar.classList.remove('collapsed');
                    if (expandBtn) expandBtn.style.display = 'none';
                }
            };

            window.toggleSidebar = function () {
                if (isSmallMobile()) {
                    // Trên màn hình nhỏ: toggle đơn giản show/hide
                    if (sidebar.classList.contains('active')) {
                        sidebar.classList.remove('active');
                        overlay.classList.remove('active');
                    } else {
                        sidebar.classList.remove('collapsed');
                        sidebar.classList.add('active');
                        overlay.classList.add('active');
                    }
                } else {
                    // Màn hình lớn hơn: logic cũ
                    sidebar.classList.toggle('active');
                    overlay.classList.toggle('active');
                }
            };

            window.closeSidebar = function () {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            };

            window.closeDetailPanel = function () {
                const detailPanel = document.getElementById('detailPanel');
                if (detailPanel) detailPanel.classList.remove('show');
            };

            // Reset trạng thái khi resize màn hình
            window.addEventListener('resize', function () {
                if (!isMobile()) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                }
                if (isMobile()) {
                    sidebar.classList.remove('collapsed');
                    if (expandBtn) expandBtn.style.display = 'none';
                }
            });

            // Khởi tạo
            if (isMobile()) {
                sidebar.classList.remove('collapsed');
                if (expandBtn) expandBtn.style.display = 'none';
            }
        });
    </script>
